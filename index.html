<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>liuencheng.cn | 建设中</title>
<style>
  :root { color-scheme: dark; }

  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: #050510;
    color: #e0e0e0;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
  }

  .content {
    position: relative; z-index: 2;
    text-align: center;
    padding: 2rem;
  }

  .icon {
    width: 80px; height: 80px;
    margin: 0 auto 2rem;
    border: 2px solid rgba(120,200,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    animation: pulse 3s ease-in-out infinite;
  }

  .icon svg {
    width: 36px; height: 36px;
    stroke: #78c8ff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(120,200,255,0.2); }
    50% { box-shadow: 0 0 0 30px rgba(120,200,255,0); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700; color: #fff;
    margin-bottom: 1rem;
    letter-spacing: 0.05em;
  }

  p {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.4);
    line-height: 1.8;
    max-width: 500px; margin: 0 auto;
  }

  .accent { color: #78c8ff; }

  .domain {
    margin-top: 2.5rem;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(120,200,255,0.5);
  }

  .noise {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    z-index: 1; pointer-events: none; opacity: 0.4;
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="noise"></div>

<div class="content">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <circle cx="12" cy="16" r="0.5" fill="#78c8ff"/>
    </svg>
  </div>
  <h1>正在建设中</h1>
  <p>
    网站正在搭建，暂时还无法访问。<br>
    稍等片刻，<span class="accent">精彩即将上线</span>。
  </p>
  <div class="domain">liuencheng.cn</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('bg');
const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 20;

const particleCount = 300;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);
const sizes = new Float32Array(particleCount);
const velocities = new Float32Array(particleCount * 3);
const phases = new Float32Array(particleCount);

const palette = [
  new THREE.Color('#78c8ff'),
  new THREE.Color('#ff6b9d'),
  new THREE.Color('#7b5ea7'),
];

for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 30;
  positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
  velocities[i * 3] = (Math.random() - 0.5) * 0.01;
  velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.01;
  velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.005;
  const c = palette[Math.floor(Math.random() * palette.length)];
  colors[i * 3] = c.r;
  colors[i * 3 + 1] = c.g;
  colors[i * 3 + 2] = c.b;
  sizes[i] = Math.random() * 2 + 0.5;
  phases[i] = Math.random() * Math.PI * 2;
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const material = new THREE.ShaderMaterial({
  uniforms: { time: { value: 0 } },
  vertexShader: `
    attribute float size;
    varying vec3 vColor;
    varying float vAlpha;
    uniform float time;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (150.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
      vAlpha = 0.4 + 0.4 * sin(position.x * 0.4 + position.y * 0.4 + time);
    }
  `,
  fragmentShader: `
    varying vec3 vColor;
    varying float vAlpha;
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = smoothstep(0.5, 0.0, d) * vAlpha * 0.6;
      gl_FragColor = vec4(vColor, a);
    }
  `,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  vertexColors: true,
});

const particles = new THREE.Points(geometry, material);
scene.add(particles);

const clock = new THREE.Clock();
function animate() {
  const t = clock.getElapsedTime();
  material.uniforms.time.value = t;
  const arr = geometry.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    const i3 = i * 3;
    arr[i3] += velocities[i3] + Math.sin(arr[i3 + 1] * 0.3 + t * 0.5 + phases[i]) * 0.015;
    arr[i3 + 1] += velocities[i3 + 1] + Math.cos(arr[i3] * 0.3 + t * 0.4 + phases[i]) * 0.015;
    arr[i3 + 2] += velocities[i3 + 2];
    if (Math.abs(arr[i3]) > 15) arr[i3] *= -0.98;
    if (Math.abs(arr[i3 + 1]) > 10) arr[i3 + 1] *= -0.98;
    if (Math.abs(arr[i3 + 2]) > 5) arr[i3 + 2] *= -0.98;
  }
  geometry.attributes.position.needsUpdate = true;
  particles.rotation.y += 0.001;
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
